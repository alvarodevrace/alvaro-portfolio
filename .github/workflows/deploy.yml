name: Deploy to Coolify

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Coolify deploy
        run: |
          curl -s -X GET \
            "https://coolify.alvarodevrace.tech/api/v1/deploy?uuid=jsas8iq6o0jr2kv5kalhtnmp&force=false" \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}"
